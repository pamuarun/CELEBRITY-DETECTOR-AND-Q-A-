version: 2.1

executors:
  docker-executor:
    docker:
      - image: google/cloud-sdk:latest
    working_directory: ~/repo

jobs:
  checkout_code:
    executor: docker-executor
    steps:
      - checkout

  build_docker_image:
    executor: docker-executor
    steps:
      - checkout
      - setup_remote_docker
      - run:
          name: Authenticate with google cloud
          command: |
              if [ -z "$GCLOUD_SERVICE_KEY" ]; then
                echo "ERROR: GCLOUD_SERVICE_KEY environment variable is not set. Please configure it in CircleCI project settings." >&2
                exit 1
              fi
              echo "$GCLOUD_SERVICE_KEY" | base64 --decode > gcp-key.json
              if [ ! -s gcp-key.json ]; then
                echo "ERROR: gcp-key.json is empty. GCLOUD_SERVICE_KEY may not be valid base64-encoded JSON." >&2
                exit 1
              fi
              gcloud auth activate-service-account --key-file=gcp-key.json
              gcloud auth configure-docker us-central1-docker.pkg.dev || gcloud auth configure-docker

      - run:
          name: Build and Push Image
          command: |
              docker build -t us-central1-docker.pkg.dev/$GOOGLE_PROJECT_ID/llmops-repo/llmops-app:latest .
              docker push us-central1-docker.pkg.dev/$GOOGLE_PROJECT_ID/llmops-repo/llmops-app:latest

  deploy_to_gke:
    executor: docker-executor
    steps:
      - checkout
      - setup_remote_docker
      - run:
          name: Authenticate with google cloud
          command: |
              if [ -z "$GCLOUD_SERVICE_KEY" ]; then
                echo "ERROR: GCLOUD_SERVICE_KEY environment variable is not set. Please configure it in CircleCI project settings." >&2
                exit 1
              fi
              echo "$GCLOUD_SERVICE_KEY" | base64 --decode > gcp-key.json
              if [ ! -s gcp-key.json ]; then
                echo "ERROR: gcp-key.json is empty. GCLOUD_SERVICE_KEY may not be valid base64-encoded JSON." >&2
                exit 1
              fi
              gcloud auth activate-service-account --key-file=gcp-key.json
              gcloud auth configure-docker us-central1-docker.pkg.dev || gcloud auth configure-docker
      
      - run:
          name: Configure GKE
          command: |
              gcloud container clusters get-credentials $GKE_CLUSTER --region $GOOGLE_COMPUTE_REGION --project $GOOGLE_PROJECT_ID
      - run:
          name: Deploy to GKE
          command: |
              kubectl apply -f kubernetes-deployment.yaml --validate=false
              kubectl rollout restart deployment llmops-app

workflows:
  version: 2
  deploy_pipeline:
    jobs:
      - checkout_code
      - build_docker_image:
          requires:
            - checkout_code
      - deploy_to_gke:
          requires:
            - build_docker_image

    




