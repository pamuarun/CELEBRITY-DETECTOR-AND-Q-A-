version: 2.1

jobs:
  build_docker_image:
    machine:
      image: ubuntu-2204:current   # ✅ stable image
    steps:
      - checkout

      # Install gcloud NON-INTERACTIVE
      - run:
          name: Install Google Cloud SDK
          command: |
            export CLOUDSDK_CORE_DISABLE_PROMPTS=1
            curl -sSL https://sdk.cloud.google.com | bash > /dev/null
            source $HOME/google-cloud-sdk/path.bash.inc
            gcloud --quiet components install kubectl
            gcloud --version

      # Authenticate
      - run:
          name: Authenticate with Google Cloud
          command: |
            echo "$GCLOUD_SERVICE_KEY" | base64 --decode > gcp-key.json
            gcloud auth activate-service-account --key-file=gcp-key.json
            gcloud config set project $GOOGLE_PROJECT_ID
            gcloud auth configure-docker us-central1-docker.pkg.dev -q

      # Build & Push
      - run:
          name: Build and Push Docker Image
          command: |
            docker build -t us-central1-docker.pkg.dev/$GOOGLE_PROJECT_ID/llmops-repo/llmops-app:latest .
            docker push us-central1-docker.pkg.dev/$GOOGLE_PROJECT_ID/llmops-repo/llmops-app:latest


  deploy_to_gke:
    machine:
      image: ubuntu-2204:current
    steps:
      - checkout

      # Install gcloud + kubectl
      - run:
          name: Install Google Cloud SDK
          command: |
            export CLOUDSDK_CORE_DISABLE_PROMPTS=1
            curl -sSL https://sdk.cloud.google.com | bash > /dev/null
            source $HOME/google-cloud-sdk/path.bash.inc
            gcloud --quiet components install kubectl

      # Authenticate
      - run:
          name: Authenticate with Google Cloud
          command: |
            echo "$GCLOUD_SERVICE_KEY" | base64 --decode > gcp-key.json
            gcloud auth activate-service-account --key-file=gcp-key.json
            gcloud config set project $GOOGLE_PROJECT_ID

      # Configure cluster
      - run:
          name: Configure GKE
          command: |
            gcloud container clusters get-credentials $GKE_CLUSTER \
              --region $GOOGLE_COMPUTE_REGION \
              --project $GOOGLE_PROJECT_ID

      # Deploy
      - run:
          name: Deploy to GKE
          command: |
            kubectl apply -f kubernetes-deployment.yaml --validate=false
            kubectl rollout restart deployment llmops-app


workflows:
  version: 2
  deploy_pipeline:
    jobs:
      - build_docker_image
      - deploy_to_gke:
          requires:
            - build_docker_image