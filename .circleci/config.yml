version: 2.1

jobs:
  build_docker_image:
    machine:
      image: ubuntu-2204:current
    steps:
      - checkout

      # Install gcloud
      - run:
          name: Install Google Cloud SDK
          command: |
            export CLOUDSDK_CORE_DISABLE_PROMPTS=1
            curl -sSL https://sdk.cloud.google.com | bash > /dev/null
            source $HOME/google-cloud-sdk/path.bash.inc
            gcloud --version

      # Authenticate
      - run:
          name: Authenticate with Google Cloud
          command: |
            echo "$GCLOUD_SERVICE_KEY" | base64 --decode > gcp-key.json
            gcloud auth activate-service-account --key-file=gcp-key.json
            gcloud config set project $GOOGLE_PROJECT_ID
            gcloud auth configure-docker us-central1-docker.pkg.dev -q

      # Build & Push
      - run:
          name: Build and Push Docker Image
          command: |
            docker build -t us-central1-docker.pkg.dev/$GOOGLE_PROJECT_ID/llmops-repo/llmops-app:latest .
            docker push us-central1-docker.pkg.dev/$GOOGLE_PROJECT_ID/llmops-repo/llmops-app:latest


  deploy_to_gke:
    machine:
      image: ubuntu-2204:current
    steps:
      - checkout

      # Install kubectl
      - run:
          name: Install kubectl
          command: |
            curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
            chmod +x kubectl
            sudo mv kubectl /usr/local/bin/
            kubectl version --client

      # Install gcloud + GKE auth plugin
      - run:
          name: Install gcloud + GKE auth plugin
          command: |
            export CLOUDSDK_CORE_DISABLE_PROMPTS=1
            curl -sSL https://sdk.cloud.google.com | bash > /dev/null
            source $HOME/google-cloud-sdk/path.bash.inc

            # ✅ Install required plugin
            gcloud components install gke-gcloud-auth-plugin -q

            # ✅ Enable plugin
            echo 'export USE_GKE_GCLOUD_AUTH_PLUGIN=True' >> $BASH_ENV

      # Authenticate
      - run:
          name: Authenticate with Google Cloud
          command: |
            source $BASH_ENV
            echo "$GCLOUD_SERVICE_KEY" | base64 --decode > gcp-key.json
            gcloud auth activate-service-account --key-file=gcp-key.json
            gcloud config set project $GOOGLE_PROJECT_ID

      # Configure cluster
      - run:
          name: Configure GKE
          command: |
            source $BASH_ENV
            gcloud container clusters get-credentials $GKE_CLUSTER \
              --region $GOOGLE_COMPUTE_REGION \
              --project $GOOGLE_PROJECT_ID

      # Deploy
      - run:
          name: Deploy to GKE
          command: |
            source $BASH_ENV
            kubectl apply -f kubernetes-deployment.yaml --validate=false
            kubectl rollout restart deployment llmops-app


workflows:
  version: 2
  deploy_pipeline:
    jobs:
      - build_docker_image
      - deploy_to_gke:
          requires:
            - build_docker_image